name: Update latest blog posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: 'https://blog.keyo.tw/rss.xml'
          max_post_count: 5
          template: '$newline- [$title]($url?utm_source=github&utm_medium=profile&utm_campaign=latest_blog_posts&utm_content=readme)'
